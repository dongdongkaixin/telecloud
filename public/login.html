<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TeleCloud — 登录</title>
  <link rel="stylesheet" href="/assets/style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-gradient);
    }
    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .login-card h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .login-card p.sub { color: var(--text-muted); margin-bottom: 32px; font-size: 0.9rem; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-muted); }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .form-group input:focus { outline: none; border-color: #60a5fa; }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }
    .error-msg { color: #f87171; font-size: 0.85rem; margin-top: 12px; display: none; }
    .logo-icon { font-size: 2.5rem; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-icon">☁️</div>
    <h1>TeleCloud</h1>
    <p class="sub">私人云存储空间，请登录后访问</p>
    <form id="loginForm">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login" id="loginBtn">登 录</button>
      <p class="error-msg" id="errorMsg"></p>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errMsg = document.getElementById('errorMsg');
      btn.textContent = '登录中...';
      btn.disabled = true;
      errMsg.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
          credentials: 'include',
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('tc_token', data.token);
          localStorage.setItem('tc_role', data.role);
          window.location.href = '/index.html';
        } else {
          errMsg.textContent = data.error || '用户名或密码错误';
          errMsg.style.display = 'block';
        }
      } catch (err) {
        errMsg.textContent = '网络错误，请重试';
        errMsg.style.display = 'block';
      } finally {
        btn.textContent = '登 录';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
